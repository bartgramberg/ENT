[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  # Bundle the prompt + knowledge markdown so chat.mjs can compose the system
  # prompt server-side at runtime.
  included_files = ["prompts/**", "knowledge/**"]

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo.html"
  status = 200

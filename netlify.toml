[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  # Bundle the prompt + knowledge markdown + bronconfig so the functions can
  # compose the system prompt and run the hyperlocal scan server-side at runtime.
  included_files = ["prompts/**", "knowledge/**", "data/**"]

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/analyse"
  to = "/.netlify/functions/analyse"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo.html"
  status = 200
